    <script>
      (function () {
        try {
          var color = localStorage.getItem('app-accent-color');
          if (!/^#[0-9a-fA-F]{6}$/.test(color || '')) return;
          var r = parseInt(color.slice(1, 3), 16);
          var g = parseInt(color.slice(3, 5), 16);
          var b = parseInt(color.slice(5, 7), 16);
          var root = document.documentElement;
          root.style.setProperty('--color-accent', color);
          root.style.setProperty('--app-accent', color);
          root.style.setProperty('--app-accent-strong', color);
          root.style.setProperty('--app-accent-soft', 'rgba(' + r + ', ' + g + ', ' + b + ', 0.14)');
          root.style.setProperty('--app-accent-softer', 'rgba(' + r + ', ' + g + ', ' + b + ', 0.08)');
        } catch (error) {}
      })();
    </script>
    <!-- All fonts loaded locally via @fontsource and local woff2 files. No external CDN needed. -->
